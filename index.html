:root{--bg:#f0f4f0;--surface:#fff;--surface2:#f7f9f7;--border:#d0ddd0;--blue:#002776;--green:#009c3b;--gold:#ffdf00;--red:#e63329;--text:#0a1a0a;--muted:#5a7a5a;--orange:#d97706}

.tabs-wrap{background:var(--blue);border-radius:12px;padding:4px;margin-bottom:16px}
.tabs{display:flex;gap:3px;flex-wrap:wrap}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;transition:.15s;white-space:nowrap;min-width:60px}
.tab.active{background:var(--gold);color:var(--blue)}
.tab:hover:not(.active){background:rgba(255,255,255,.1);color:#fff}
.section{display:none}.section.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.login-wrap{max-width:380px;margin:40px auto}
.login-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,39,118,.08)}
.login-wrap h2{font-family:'Bebas Neue',sans-serif;font-size:32px;text-align:center;color:var(--blue);margin-bottom:4px}
.login-wrap p{text-align:center;color:var(--muted);margin-bottom:24px;font-size:13px}
.login-flag{font-size:36px;text-align:center;display:block;margin-bottom:8px}
input,select{width:100%;padding:10px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px;transition:.15s}
input:focus,select:focus{border-color:var(--blue)}
.btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s}
.btn:hover{opacity:.88}
.btn-green{background:var(--green)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:6px 14px;font-size:12px;width:auto;border-radius:6px}
.btn-danger{background:var(--red);color:#fff}
.btn-yellow{background:var(--gold);color:var(--blue)}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.user-pill{background:var(--blue);border-radius:20px;padding:6px 14px;font-size:13px;display:flex;align-items:center;gap:8px;color:#fff}
.user-pill strong{color:var(--gold)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite}

.rank-row.me{border-color:var(--green);background:#f0fff4}
.rank-pos{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);min-width:28px;text-align:center}

.rank-pts{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--blue)}

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password+"bolao2026_salt");
  const hashBuffer=await crypto.subtle.digest("SHA-256",data);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,"0")).join("");
}

function matchTime(date,time){
  const [d,m]=date.split("/").map(Number);
  const t=(time||"12h").replace("h",":");
  const [hStr,minStr]=t.split(":");
  return new Date(Date.UTC(2026,m-1,d,parseInt(hStr)+3,parseInt(minStr||"0"),0));
}
function lockTime(dt){return new Date(dt.getTime()-60*60*1000)}
function matchState(mt,hasResult){
  if(hasResult)return"played";
  const now=Date.now(),lt=lockTime(mt).getTime();
  if(now>=lt)return"locked";
  if(lt-now<2*3600000)return"soon";
  return"open";
}
function fmtCountdown(ms){
  if(ms<=0)return"";
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);
  return h>0?`${h}h ${m}min`:`${m}min`;
}
function fmtLockBRT(mt){
  const brt=new Date(lockTime(mt).getTime()-3*3600000);
  return`${brt.getUTCDate().toString().padStart(2,"0")}/${(brt.getUTCMonth()+1).toString().padStart(2,"0")} às ${brt.getUTCHours().toString().padStart(2,"0")}h${brt.getUTCMinutes()>0?brt.getUTCMinutes().toString().padStart(2,"0"):""}`;
}

// ─── PONTUAÇÃO ───
function calcPts(pal,res,mult=1){
  if(!res||res.h===undefined||res.h==="")return null;
  if(!pal||pal.h===undefined||pal.h==="")return 0;
  const ph=parseInt(pal.h),pa=parseInt(pal.a),rh=parseInt(res.h),ra=parseInt(res.a);
  if(isNaN(ph)||isNaN(pa))return 0;
  let pts=0;
  if((ph>pa?1:ph<pa?-1:0)===(rh>ra?1:rh<ra?-1:0))pts+=1;
  if((ph-pa)===(rh-ra))pts+=1;
  if(ph===rh&&pa===ra)pts+=3;
  return pts*mult;
}

function totalPts(name){
  const p=fbState.players[name];if(!p)return 0;
  let total=0;
  GROUP_MATCHES.forEach(m=>{const pts=calcPts(p.palpites?.[m.id],fbState.results[m.id],1);if(pts)total+=pts;});
  fbState.elimMatches.forEach(m=>{const pts=calcPts(p.elimPalpites?.['e_'+m.id],fbState.results['e_'+m.id],2);if(pts)total+=pts;});
  const esp=fbState.especiais,pEsp=p.especiais||{};
  if(esp.artilheiro&&pEsp.artilheiro&&esp.artilheiro.toLowerCase()===pEsp.artilheiro.toLowerCase())total+=5;
  if(esp.campeao&&pEsp.campeao&&esp.campeao.toLowerCase()===pEsp.campeao.toLowerCase())total+=5;
  return total;
}
function statsPlayer(name){
  const p=fbState.players[name];if(!p)return{acertos:0,exatos:0};
  let acertos=0,exatos=0;
  GROUP_MATCHES.forEach(m=>{
    const pts=calcPts(p.palpites?.[m.id],fbState.results[m.id],1);
    if(pts>0)acertos++;if(pts===5)exatos++;
  });
  fbState.elimMatches.forEach(m=>{
    const pts=calcPts(p.elimPalpites?.['e_'+m.id],fbState.results['e_'+m.id],2);
    if(pts>0)acertos++;if(pts===10)exatos++;
  });
  return{acertos,exatos};
}
function countPalpites(name){
  const p=fbState.players[name];if(!p)return 0;
  return Object.keys(p.palpites||{}).length+Object.keys(p.elimPalpites||{}).length;
}

// ─── HISTÓRICO DE EVOLUÇÃO E FORMA RECENTE ───
// Retorna lista de todos os jogos com resultado, ordenados cronologicamente
function getOrderedPlayedMatches(){
  const all=[];
  GROUP_MATCHES.forEach(m=>{
    const res=fbState.results[m.id];
    if(res?.h!==undefined){
      all.push({id:m.id,isElim:false,mt:matchTime(m.date,m.time),mult:1,res});
    }
  });
  fbState.elimMatches.forEach(m=>{
    const eid='e_'+m.id;
    const res=fbState.results[eid];
    if(res?.h!==undefined&&m.date&&m.time){
      all.push({id:eid,isElim:true,mt:matchTime(m.date,m.time),mult:2,res});
    }
  });
  all.sort((a,b)=>a.mt-b.mt);
  return all;
}

// Calcula pontos acumulados de cada jogador a cada jogo (para o gráfico de evolução)
function computeEvolutionData(){
  const playedMatches=getOrderedPlayedMatches();
  const players=Object.keys(fbState.players);
  const cumPts={};
  players.forEach(n=>cumPts[n]=0);
  const series={};
  players.forEach(n=>series[n]=[]);

  playedMatches.forEach(match=>{
    players.forEach(n=>{
      const p=fbState.players[n];
      const pal=match.isElim?p.elimPalpites?.[match.id]:p.palpites?.[match.id];
      const pts=calcPts(pal,match.res,match.mult);
      cumPts[n]+=(pts||0);
    });
    // calcula ranking (posição) deste momento
    const ranked=players.map(n=>({n,pts:cumPts[n]})).sort((a,b)=>b.pts-a.pts);
    const posMap={};
    ranked.forEach((r,i)=>posMap[r.n]=i+1);
    players.forEach(n=>series[n].push({pos:posMap[n],pts:cumPts[n]}));
  });

  return {labels:playedMatches.map((_,i)=>`J${i+1}`),series,totalGames:playedMatches.length};
}

// Forma recente: últimos 5 jogos com resultado, na ordem cronológica
// Retorna array de {color} onde color = green|yellow|gray|red
function getRecentForm(name,limit=5){
  const p=fbState.players[name];if(!p)return[];
  const playedMatches=getOrderedPlayedMatches();
  const form=[];
  playedMatches.forEach(match=>{
    const pal=match.isElim?p.elimPalpites?.[match.id]:p.palpites?.[match.id];
    const res=match.res;
    if(!pal||pal.h===undefined||pal.h===""){
      form.push("none"); // não palpitou
      return;
    }
    const ph=parseInt(pal.h),pa=parseInt(pal.a),rh=parseInt(res.h),ra=parseInt(res.a);
    const exact=ph===rh&&pa===ra;
    const winnerOk=(ph>pa?1:ph<pa?-1:0)===(rh>ra?1:rh<ra?-1:0);
    const saldoOk=(ph-pa)===(rh-ra);
    if(exact)form.push("green");
    else if(winnerOk&&saldoOk)form.push("yellow");
    else if(winnerOk)form.push("gray");
    else form.push("red");
  });
  return form.slice(-limit);
}

async function autoSavePalpite(key,isElim){
  const buf=inputBuffer[key];
  if(!buf||buf.h===undefined||buf.h===""||buf.a===undefined||buf.a==="")return;
  // Admin salva para o jogador selecionado; jogador salva para si mesmo
  const targetPlayer=isAdmin?detailPlayer:currentUser;
  if(!targetPlayer){console.warn("Nenhum jogador selecionado para salvar");return;}
  const statusEl=document.getElementById(`status_${key}`);
  if(statusEl){statusEl.textContent="💾 Salvando...";statusEl.className="save-status saving";}
  try{
    const updates={};
    if(isElim){
      updates[`bolao/players/${targetPlayer}/elimPalpites/${key}/h`]=buf.h;
      updates[`bolao/players/${targetPlayer}/elimPalpites/${key}/a`]=buf.a;
    } else {
      updates[`bolao/players/${targetPlayer}/palpites/${key}/h`]=buf.h;
      updates[`bolao/players/${targetPlayer}/palpites/${key}/a`]=buf.a;
    }
    await update(ref(db),updates);
    delete inputBuffer[key];
    if(statusEl){statusEl.textContent="✅ Salvo automaticamente";statusEl.className="save-status saved";setTimeout(()=>{if(statusEl)statusEl.textContent="";},3000);}
    // verde na borda do match-row
    const row=statusEl?.closest(".match-row");
    if(row){row.classList.add("autosaved");setTimeout(()=>row.classList.remove("autosaved"),3000);}
  }catch(e){
    if(statusEl){statusEl.textContent="❌ Erro ao salvar";statusEl.className="save-status error";}
  }
}

function bindLogin(){
  document.getElementById("btn-login").onclick=async()=>{
    const name=document.getElementById("l-name").value.trim();
    const sec=document.getElementById("l-secret").value.trim();
    const password=document.getElementById("l-password").value.trim();
    const al=document.getElementById("login-alert");
    if(!name){al.innerHTML='<div class="alert error">Informe seu nome</div>';return;}
    if(!password){al.innerHTML='<div class="alert error">Informe sua senha pessoal</div>';return;}

    const playerExists=fbState.players[name];
    const passwordHash=await hashPassword(password);

    if(playerExists){
      if(playerExists.password){
        const isHashed=playerExists.password.length===64; // SHA-256 = 64 hex chars
        if(isHashed){
          // Senha já em hash — comparar normalmente
          if(playerExists.password!==passwordHash){
            al.innerHTML='<div class="alert error">Senha incorreta</div>';return;
          }
        } else {
          // Senha em texto puro (cadastro antigo) — comparar e migrar para hash
          if(playerExists.password!==password){
            al.innerHTML='<div class="alert error">Senha incorreta</div>';return;
          }
          // Migra automaticamente para hash
          await update(ref(db),{[`bolao/players/${name}/password`]:passwordHash});
        }
      }
      // senha OK — logar
      currentUser=name;isAdmin=false;
      saveSession();
      // Se ainda não tem senha salva (cadastro antigo sem senha), salva o hash agora
      if(!playerExists.password){
        await update(ref(db),{[`bolao/players/${name}/password`]:passwordHash});
      }
    } else {
      // Novo jogador — verificar código do bolão
      if(sec!==fbState.secret){al.innerHTML='<div class="alert error">Código do bolão incorreto</div>';return;}
      if(password.length<4){al.innerHTML='<div class="alert error">Senha deve ter pelo menos 4 caracteres</div>';return;}
      currentUser=name;isAdmin=false;
      saveSession();
      try {
        await set(ref(db,`bolao/players/${name}`),{palpites:{},elimPalpites:{},especiais:{},password:passwordHash});
        fbState.players[name]={palpites:{},elimPalpites:{},especiais:{},password:passwordHash};
      } catch(e) {
        console.error("Erro ao cadastrar:",e);
        fbState.players[name]={palpites:{},elimPalpites:{},especiais:{},password:passwordHash};
      }
    }
    render();
    startApiSync();
  };
  document.getElementById("btn-admin-show").onclick=()=>document.getElementById("admin-login-form").style.display="block";
  document.getElementById("btn-admin-login").onclick=()=>{
    const pass=document.getElementById("l-admin-pass").value.trim();
    const al=document.getElementById("login-alert");
    if(pass!==fbState.adminPass){al.innerHTML='<div class="alert error">Senha incorreta</div>';return;}
    isAdmin=true;currentUser=null;
    saveSession();
    render();
    startApiSync();
  };
}

  const renderRow=(tabs)=>tabs.map(t=>`<button class="tab ${currentTab===t.k?"active":""}" data-tab="${t.k}">${t.label}</button>`).join("");
  return`<div class="tabs-wrap">
    <div class="tabs">${renderRow(row1)}</div>
    <div class="tabs" style="margin-top:4px">${renderRow(row2)}</div>
  </div>`;
}

function renderRanking(){
  const players=Object.keys(fbState.players);
  if(!players.length)return`<div class="empty"><div class="icon">👥</div><p>Nenhum jogador ainda</p></div>`;
  const sorted=players.map(n=>({n,pts:totalPts(n),st:statsPlayer(n)})).sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:b.st.acertos!==a.st.acertos?b.st.acertos-a.st.acertos:b.st.exatos-a.st.exatos);
  const medals=["🥇","🥈","🥉"];
  const posClass=i=>i===0?"p1":i===1?"p2":i===2?"p3":"";
  const TOTAL_GAMES=104; // 72 grupos + 32 eliminatórias
  const played=Object.keys(fbState.results).length;
  const pct=Math.round(played/TOTAL_GAMES*100);
  const syncInfo=lastApiSync?`<span style="font-size:11px;color:var(--muted)">Última atualização: ${lastApiSync.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>`:"";
  return`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:13px;color:var(--muted)">Progresso da Copa · ${syncInfo}</span>
        <span style="font-size:13px;font-weight:700;color:var(--blue)">${played} / ${TOTAL_GAMES} jogos</span>
      </div>
      <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${sorted.map((p,i)=>{
      const isMe=p.n===currentUser;
      const form=getRecentForm(p.n,5);
      const formHtml=form.length?`<span style="margin-left:6px">${form.map(formDot).join("")}</span>`:"";
      return`<div class="rank-row ${isMe?"me":""}">
        <div class="rank-pos ${posClass(i)}">${i<3?medals[i]:i+1}</div>
        <div style="flex:1">
          <div class="rank-name">${p.n}${isMe?' <span style="font-size:11px;color:var(--green)">(você)</span>':""}${formHtml}</div>
          <div class="rank-sub">${p.st.acertos} acertos · ${p.st.exatos} exatos · ${countPalpites(p.n)} palpites</div>
        </div>
        <div class="rank-pts">${p.pts}<span style="font-size:12px;color:var(--muted);font-family:'DM Sans'"> pts</span></div>
      </div>`;
    }).join("")}`;
}

let evoChartInstance=null;
let evoHighlighted=new Set(); // múltiplos participantes destacados
let evoAllHighlighted=false;

const EVO_PALETTE=["#a78bfa","#fb923c","#34d399","#f472b6","#60a5fa","#fbbf24","#a3e635","#f87171","#22d3ee","#c084fc","#fb7185","#4ade80"];

function setupEvolutionChart(){
  const canvas=document.getElementById("evoChart");
  if(!canvas||typeof Chart==="undefined")return;
  const evo=computeEvolutionData();
  if(evo.totalGames===0)return;

  const players=Object.keys(fbState.players);

  // jogador logado sempre conta como destacado implicitamente, mas não trava o toggle
  const isActiveHighlight=(n)=>evoAllHighlighted||evoHighlighted.has(n)||n===currentUser;

  const datasets=players.map((n,i)=>{
    const active=isActiveHighlight(n);
    const isMe=n===currentUser;
    const baseColor=isMe?"#009c3b":EVO_PALETTE[i%EVO_PALETTE.length];
    return{
      label:n,
      data:evo.series[n].map(s=>s.pos),
      borderColor:active?baseColor:"rgba(150,150,150,0.2)",
      backgroundColor:"transparent",
      borderWidth:active?3:1,
      pointRadius:active?3:0,
      pointHoverRadius:5,
      tension:0.2,
      order:active?0:1,
      _playerName:n
    };
  });

  if(evoChartInstance)evoChartInstance.destroy();
  evoChartInstance=new Chart(canvas,{
    type:"line",
    data:{labels:evo.labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        y:{reverse:true,min:1,max:players.length,ticks:{stepSize:1,font:{size:11}},title:{display:true,text:"Posição no ranking"}},
        x:{ticks:{font:{size:10},maxRotation:0,autoSkip:true}}
      },
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:(items)=>items[0]?.label||"",
            label:(item)=>`${item.dataset.label}: ${item.parsed.y}º lugar`
          }
        }
      },
      interaction:{mode:"nearest",intersect:false},
      onClick:(evt,elements,chart)=>{
        // Clique numa linha alterna o destaque daquele participante
        const points=chart.getElementsAtEventForMode(evt,"nearest",{intersect:false},true);
        if(points.length){
          const idx=points[0].datasetIndex;
          const name=chart.data.datasets[idx]._playerName;
          toggleEvoHighlight(name);
        }
      }
    }
  });

  renderEvoBadges();

  // Busca por nome
  const searchInput=document.getElementById("evo-search");
  const resultsDiv=document.getElementById("evo-search-results");

  if(searchInput){
    searchInput.oninput=()=>{
      const q=searchInput.value.trim().toLowerCase();
      if(!q){resultsDiv.style.display="none";return;}
      const matches=players.filter(n=>n.toLowerCase().includes(q)).slice(0,8);
      if(!matches.length){resultsDiv.style.display="none";return;}
      resultsDiv.style.display="block";
      resultsDiv.innerHTML=matches.map(n=>{
        const checked=evoHighlighted.has(n)?"✓ ":"";
        return`<div class="evo-result-item" data-name="${n}" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)">${checked}${n}</div>`;
      }).join("");
      resultsDiv.querySelectorAll(".evo-result-item").forEach(el=>{
        el.onclick=()=>{
          toggleEvoHighlight(el.dataset.name);
          searchInput.value="";
          resultsDiv.style.display="none";
        };
      });
    };
  }

  const btnAll=document.getElementById("evo-toggle-all");
  if(btnAll)btnAll.onclick=()=>{
    evoAllHighlighted=!evoAllHighlighted;
    if(evoAllHighlighted)evoHighlighted.clear();
    setupEvolutionChart();
  };
  const btnClear=document.getElementById("evo-clear-all");
  if(btnClear)btnClear.onclick=()=>{
    evoHighlighted.clear();
    evoAllHighlighted=false;
    setupEvolutionChart();
  };
}

function toggleEvoHighlight(name){
  if(name===currentUser)return; // jogador logado já está sempre destacado
  evoAllHighlighted=false;
  if(evoHighlighted.has(name))evoHighlighted.delete(name);
  else evoHighlighted.add(name);
  setupEvolutionChart();
}

function renderEvoBadges(){
  const badgeDiv=document.getElementById("evo-highlight-badge");
  if(!badgeDiv)return;
  const names=Array.from(evoHighlighted);
  if(evoAllHighlighted){
    badgeDiv.style.display="block";
    badgeDiv.innerHTML=`<span class="alert info" style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px">📍 Destacando todos os participantes</span>`;
    return;
  }
  if(!names.length){
    badgeDiv.style.display="none";
    return;
  }
  badgeDiv.style.display="block";
  badgeDiv.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:6px">`+
    names.map(n=>`<span class="alert info" style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;margin:0">${n} <button data-remove-evo="${n}" style="border:none;background:transparent;cursor:pointer;color:var(--blue);font-weight:600;padding:0">✕</button></span>`).join("")+
    `</div>`;
  badgeDiv.querySelectorAll("[data-remove-evo]").forEach(btn=>{
    btn.onclick=()=>{toggleEvoHighlight(btn.dataset.removeEvo);};
  });
}

// ─── PALPITES ENCERRADOS ───
let peSelectedId=null; // id do jogo atualmente exibido (string, prefixado com 'e_' se elim)
let peFilterGroup="todos";
let peFilterDate="todos";
let peSearchTeam="";

function getClosedMatchesList(){
  const now=Date.now();
  const closedGroup=GROUP_MATCHES.filter(m=>now>=lockTime(matchTime(m.date,m.time)).getTime())
    .map(m=>({...m,isElim:false,rid:String(m.id),mt:matchTime(m.date,m.time)}));
  const closedElim=fbState.elimMatches.filter(m=>{
    if(!m.date||!m.time)return false;
    return now>=lockTime(matchTime(m.date,m.time)).getTime();
  }).map(m=>({...m,isElim:true,rid:'e_'+m.id,mt:matchTime(m.date,m.time)}));
  return [...closedGroup,...closedElim].sort((a,b)=>b.mt-a.mt); // mais recente primeiro
}

function renderPalpitesEncerrados(){
  const players=Object.keys(fbState.players);
  if(!players.length)return`<div class="empty"><div class="icon">👥</div><p>Nenhum jogador ainda</p></div>`;

  const allClosed=getClosedMatchesList();
  if(!allClosed.length){
    return`<div class="empty"><div class="icon">🔒</div><p>Nenhum jogo com prazo de palpite encerrado ainda. Os palpites de cada jogo aparecem aqui automaticamente 1h antes do início — mantendo a surpresa até lá.</p></div>`;
  }

  // Aplica filtros para a LISTA de seleção (não afeta o jogo já exibido)
  let filtered=allClosed;
  if(peFilterGroup!=="todos")filtered=filtered.filter(m=>!m.isElim&&m.group===peFilterGroup||m.isElim&&m.phase===peFilterGroup);
  if(peFilterDate!=="todos")filtered=filtered.filter(m=>m.date===peFilterDate);
  if(peSearchTeam.trim()){
    const q=peSearchTeam.trim().toLowerCase();
    filtered=filtered.filter(m=>m.home.toLowerCase().includes(q)||m.away.toLowerCase().includes(q));
  }

  // Se nenhum jogo selecionado ainda, usa o mais recente da lista completa (não filtrada)
  if(!peSelectedId||!allClosed.find(m=>m.rid===peSelectedId)){
    peSelectedId=allClosed[0].rid;
  }
  const current=allClosed.find(m=>m.rid===peSelectedId)||allClosed[0];

  // Opções de filtro disponíveis
  const groupOptions=Array.from(new Set(allClosed.filter(m=>!m.isElim).map(m=>m.group))).sort();
  const phaseOptions=Array.from(new Set(allClosed.filter(m=>m.isElim).map(m=>m.phase)));
  const dateOptions=Array.from(new Set(allClosed.map(m=>m.date))).sort((a,b)=>{
    const[da,ma]=a.split("/").map(Number),[db,mb]=b.split("/").map(Number);
    return ma-mb||da-db;
  });

  // Navegação anterior/próximo dentro da lista completa ordenada
  const idxInAll=allClosed.findIndex(m=>m.rid===current.rid);
  const prevMatch=allClosed[idxInAll+1]; // mais antigo
  const nextMatch=allClosed[idxInAll-1]; // mais recente

  const res=fbState.results[current.rid];
  const mult=current.isElim?2:1;
  const rows=players.map(n=>{
    const p=fbState.players[n];
    const realPal=current.isElim?p.elimPalpites?.[current.rid]:p.palpites?.[current.id];
    const palStr=realPal?.h!==undefined?`${realPal.h} × ${realPal.a}`:"—";
    const pts=res?.h!==undefined?calcPts(realPal,res,mult):null;
    return{n,palStr,pts};
  }).sort((a,b)=>a.n.localeCompare(b.n));

  return`
    <div class="alert info">🔓 Jogos aqui têm o prazo de palpite encerrado (1h antes do início). Por padrão mostra o mais recente — use os filtros para consultar outros.</div>

    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <select id="pe-filter-group" style="margin:0;flex:1;min-width:120px">
          <option value="todos">Todos os grupos/fases</option>
          ${groupOptions.map(g=>`<option value="${g}" ${peFilterGroup===g?"selected":""}>Grupo ${g}</option>`).join("")}
          ${phaseOptions.map(p=>`<option value="${p}" ${peFilterGroup===p?"selected":""}>${p}</option>`).join("")}
        </select>
        <select id="pe-filter-date" style="margin:0;flex:1;min-width:110px">
          <option value="todos">Todas as datas</option>
          ${dateOptions.map(d=>`<option value="${d}" ${peFilterDate===d?"selected":""}>${d}</option>`).join("")}
        </select>
      </div>
      <input id="pe-search-team" placeholder="Buscar por seleção..." value="${peSearchTeam}" style="margin-bottom:8px">
      <div id="pe-match-list" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
        ${filtered.length?filtered.map(m=>{
          const isActive=m.rid===current.rid;
          return`<div class="pe-list-item" data-rid="${m.rid}" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);${isActive?'background:var(--surface2);font-weight:600':''}">
            ${flag(m.home)} ${m.home} × ${m.away} ${flag(m.away)} <span style="color:var(--muted);font-size:11px">· ${m.date} · ${m.isElim?m.phase:'Grupo '+m.group}</span>
          </div>`;
        }).join(""):'<div style="padding:12px;color:var(--muted);font-size:13px">Nenhum jogo encontrado com esse filtro</div>'}
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <button class="btn btn-sm btn-outline" id="pe-prev" ${!prevMatch?"disabled style='opacity:.4'":""}>← Anterior</button>
        <span style="font-size:11px;color:var(--muted)">${idxInAll+1} de ${allClosed.length}</span>
        <button class="btn btn-sm btn-outline" id="pe-next" ${!nextMatch?"disabled style='opacity:.4'":""}>Próximo →</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--blue)">${flag(current.home)} ${current.home} × ${current.away} ${flag(current.away)}</div>
          <div style="font-size:11px;color:var(--muted)">${current.isElim?current.phase:'Grupo '+current.group} · ${current.time||"?"} BRT · ${current.date}${current.isElim?' · ×'+mult+' pts':''}</div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:${res?.h!==undefined?"var(--green)":"var(--muted)"}">${res?.h!==undefined?`${res.h} × ${res.a}`:"Aguardando resultado"}</div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="border-bottom:2px solid var(--gold)">
            <th style="text-align:left;padding:6px 8px;color:var(--muted);font-weight:600">Participante</th>
            <th style="text-align:center;padding:6px 8px;color:var(--muted);font-weight:600">Palpite</th>
            <th style="text-align:right;padding:6px 8px;color:var(--muted);font-weight:600">Pontos</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>`<tr style="border-bottom:1px solid var(--border)${r.n===currentUser?';background:#f0fff4':''}">
            <td style="padding:6px 8px">${r.n}${r.n===currentUser?' <span style="font-size:11px;color:var(--green)">(você)</span>':''}</td>
            <td style="text-align:center;padding:6px 8px;font-weight:600">${r.palStr}</td>
            <td style="text-align:right;padding:6px 8px;color:${r.pts===null?'var(--muted)':r.pts===0?'var(--red)':'var(--green)'};font-weight:600">${r.pts===null?'—':r.pts}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function renderPalpites(){
  const phTabs=`<div class="phase-tabs">${["Grupos",...ELIM_PHASES.map(e=>e.phase)].map(p=>`<button class="phase-tab ${currentPhase===p?"active":""}" data-phase="${p}">${p==="Grupos"?"Fase de Grupos":ELIM_PHASES.find(e=>e.phase===p)?.label||p}</button>`).join("")}</div>`;
  const viewPlayer=isAdmin?detailPlayer:currentUser;
  const playerSel=isAdmin?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <label style="color:var(--muted);font-size:13px;white-space:nowrap">Ver palpites de:</label>
    <select id="sel-detail-player" style="margin:0;max-width:200px">
      <option value="">-- selecione --</option>
      ${Object.keys(fbState.players).map(n=>`<option value="${n}" ${detailPlayer===n?"selected":""}>${n}</option>`).join("")}
    </select>
  </div>`:"";

  const upcoming=GROUP_MATCHES.filter(m=>{
    const mt=matchTime(m.date,m.time),ms=lockTime(mt).getTime()-Date.now();
    return ms>0&&ms<3600000&&!fbState.results[m.id];
  });
  const warnBanner=upcoming.length&&!isAdmin?`<div class="alert warn">⚠️ ${upcoming.length} jogo(s) fechando em menos de 1h: ${upcoming.map(m=>`${flag(m.home)}${m.home}×${flag(m.away)}${m.away}`).join(", ")}</div>`:"";
  const autoSaveInfo=!isAdmin?`<div class="alert info" style="margin-bottom:12px">💡 Seus palpites são salvos automaticamente assim que você preencher os dois campos de cada jogo.</div>`:"";

  if(currentPhase==="Grupos"){
    // Toggle de visualização
    const viewToggle=`<div class="view-toggle">
      <button class="view-btn ${palpiteView==="grupo"?"active":""}" data-view="grupo">📋 Por Grupo</button>
      <button class="view-btn ${palpiteView==="data"?"active":""}" data-view="data">📅 Por Data</button>
      <span class="filter-sep"></span>
      <button class="view-btn ${matchFilter==="todos"?"active":""}" data-filter="todos">Todos</button>
      <button class="view-btn ${matchFilter==="abertos"?"active":""}" data-filter="abertos">🟢 A jogar</button>
      <button class="view-btn ${matchFilter==="encerrados"?"active":""}" data-filter="encerrados">✅ Encerrados</button>
    </div>`;

    // Função auxiliar para renderizar uma linha de jogo
    function mkRow(m,vp){
      const mt=matchTime(m.date,m.time);
      const hasResult=fbState.results[m.id]?.h!==undefined;
      const locked=isLocked(mt,hasResult);
      const state=matchState(mt,hasResult);
      const pl=vp?fbState.players[vp]:null;
      const savedPal=pl?.palpites?.[m.id];
      const res=fbState.results[m.id];
      const pts=vp&&hasResult?calcPts(savedPal,res,1):null;
      const rowClass=state==="played"?"played":state==="locked"?"locked":state==="soon"?"warning":"";
      const key=String(m.id);
      return `<div class="match-row ${rowClass}">
        ${pts!==null?`<div class="pts-badge ${pts===0?"zero":""}">${pts===0?"✗ 0":"+"+pts}pt${pts!==1?"s":""}</div>`:""}
        <div class="match-team">${flag(m.home)} ${m.home}</div>
        <div class="match-info">
          <div class="score-inputs">
            <input class="score-input" type="number" min="0" max="99"
              data-mid="${m.id}" data-side="h"
              value="${savedPal?.h??""}" ${locked&&!isAdmin?'disabled':""}>
            <span class="score-sep">×</span>
            <input class="score-input" type="number" min="0" max="99"
              data-mid="${m.id}" data-side="a"
              value="${savedPal?.a??""}" ${locked&&!isAdmin?'disabled':""}>
          </div>
          <div class="match-date-label">Grupo ${m.group} · ${m.time} BRT · ${m.date} · ${m.city}</div>
          <div style="margin-top:3px">${lockBadge(mt,hasResult)}</div>
          ${hasResult?`<div style="font-size:10px;color:var(--green);margin-top:2px">Resultado: ${res.h}×${res.a}</div>`:""}
          ${!isAdmin&&!locked?`<div id="status_${key}" class="save-status">${savedPal?.h!==undefined?"✅ Palpite salvo":""}</div>`:""}
        </div>
        <div class="match-team right">${m.away} ${flag(m.away)}</div>
      </div>`;
    }

    let html="";
    if(palpiteView==="grupo"){
      Object.keys(GROUPS).forEach(g=>{
        const filteredM=GROUPS[g].matches.filter(m=>{
          const hasResult=fbState.results[m.id]?.h!==undefined;
          const locked=isLocked(matchTime(m.date,m.time),hasResult);
          if(matchFilter==="abertos")return!locked&&!hasResult;
          if(matchFilter==="encerrados")return hasResult||(locked&&!hasResult);
          return true;
        });
        if(!filteredM.length)return;
        html+=`<div class="match-group"><div class="group-label">Grupo ${g} <span style="font-size:13px;font-family:'DM Sans';font-weight:400;color:var(--muted)">${GROUPS[g].teams.map(t=>flag(t)).join(" ")}</span></div>`;
        filteredM.forEach(m=>{ html+=mkRow({...m,group:g},viewPlayer); });
        html+="</div>";
      });
    } else {
      // Por data — ordenar todos os jogos cronologicamente
      const weekdays=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
      const sorted=GROUP_MATCHES.slice().sort((a,b)=>matchTime(a.date,a.time)-matchTime(b.date,b.time));
      const byDate={};
      sorted.forEach(m=>{ if(!byDate[m.date])byDate[m.date]=[]; byDate[m.date].push(m); });
      Object.entries(byDate).forEach(([date,matches])=>{
        const brt=new Date(matchTime(date,"12h").getTime()-3*3600000);
        const wd=weekdays[brt.getUTCDay()];
        const filteredDate=matches.filter(m=>{
          const hasResult=fbState.results[m.id]?.h!==undefined;
          const locked=isLocked(matchTime(m.date,m.time),hasResult);
          if(matchFilter==="abertos")return!locked&&!hasResult;
          if(matchFilter==="encerrados")return hasResult||(locked&&!hasResult);
          return true;
        });
        if(!filteredDate.length)return;
        html+=`<div class="date-group"><div class="date-label">📅 ${date} <span style="font-size:14px;font-family:'DM Sans';font-weight:400;color:var(--muted)">${wd}</span></div>`;
        filteredDate.forEach(m=>{ html+=mkRow(m,viewPlayer); });
        html+="</div>";
      });
    }
    const adminSaveBtn=isAdmin&&detailPlayer?`<div class="flex-end" style="margin-top:12px"><button class="btn btn-sm btn-green" id="btn-admin-save-palpites">💾 Salvar palpites de ${detailPlayer}</button></div>`:"";
    return phTabs+viewToggle+warnBanner+autoSaveInfo+playerSel+html+adminSaveBtn;
  } else {
    const elimMs=fbState.elimMatches.filter(m=>m.phase===currentPhase);
    if(!elimMs.length)return phTabs+playerSel+`<div class="empty"><div class="icon">⏳</div><p>Confrontos desta fase ainda não definidos. Serão importados automaticamente da API assim que a FIFA anunciar os jogos.</p></div>`;
    let html="";
    elimMs.forEach(m=>{
      const eid='e_'+m.id;
      const hasResult=fbState.results[eid]?.h!==undefined;
      const mt=m.date&&m.time?matchTime(m.date,m.time):null;
      const locked_elim=!isAdmin&&(hasResult||(mt?isLocked(mt,hasResult):false));
      const pl=viewPlayer?fbState.players[viewPlayer]:null;
      const savedPal=pl?.elimPalpites?.[eid];
      const res=fbState.results[eid];
      const pts=viewPlayer&&hasResult?calcPts(savedPal,res,2):null;
      html+=`<div class="match-row ${hasResult?"played":locked_elim?"locked":""}">
        ${pts!==null?`<div class="pts-badge ${pts===0?"zero":""}">${pts===0?"✗ 0":"+"+pts}pt${pts!==1?"s":""}</div>`:""}
        <div class="match-team">${flag(m.home)} ${m.home}</div>
        <div class="match-info">
          <div class="score-inputs">
            <input class="score-input" type="number" min="0" max="99"
              data-eid="${eid}" data-side="h" data-isElim="true"
              value="${savedPal?.h??""}" ${locked_elim?'disabled':""}>
            <span class="score-sep">×</span>
            <input class="score-input" type="number" min="0" max="99"
              data-eid="${eid}" data-side="a" data-isElim="true"
              value="${savedPal?.a??""}" ${locked_elim?'disabled':""}>
          </div>
          <div class="match-date-label">${m.time||"?"} BRT · ${m.date||"A definir"} · ×2 pts</div>
          <div style="margin-top:3px">${mt?lockBadge(mt,hasResult):`<span class="lock-badge lock-open">🟢 Aberto</span>`}</div>
          ${hasResult?`<div style="font-size:10px;color:var(--green);margin-top:2px">Resultado: ${res.h}×${res.a}</div>`:""}
          ${!isAdmin&&!locked_elim?`<div id="status_${eid}" class="save-status">${savedPal?.h!==undefined?"✅ Palpite salvo":""}</div>`:""}
        </div>
        <div class="match-team right">${m.away} ${flag(m.away)}</div>
      </div>`;
    });
    const adminSaveBtnElim=isAdmin&&detailPlayer?`<div class="flex-end" style="margin-top:12px"><button class="btn btn-sm btn-green" id="btn-admin-save-palpites">💾 Salvar palpites de ${detailPlayer}</button></div>`:"";
    return phTabs+autoSaveInfo+playerSel+html+adminSaveBtnElim;
  }
}

    const data=await resp.json();
    const matches=data.matches||[];
    const updates={};
    matches.forEach(match=>{
      const h=match.score?.fullTime?.home,a=match.score?.fullTime?.away;
      if(h===null||h===undefined)return;
      const homePT=toPort(match.homeTeam?.name||"");
      const awayPT=toPort(match.awayTeam?.name||"");
      const gm=GROUP_MATCHES.find(m=>(m.home===homePT&&m.away===awayPT)||(m.home===awayPT&&m.away===homePT));
      if(gm){
        const inv=gm.home===awayPT;
        updates[`bolao/results/${gm.id}/h`]=String(inv?a:h);
        updates[`bolao/results/${gm.id}/a`]=String(inv?h:a);
      }
      const em=fbState.elimMatches.find(m=>(m.home===homePT&&m.away===awayPT)||(m.home===awayPT&&m.away===homePT));
      if(em){
        const eid='e_'+em.id,inv=em.home===awayPT;
        updates[`bolao/results/${eid}/h`]=String(inv?a:h);
        updates[`bolao/results/${eid}/a`]=String(inv?h:a);
      }
    });
    if(Object.keys(updates).length)await update(ref(db),updates);
  }catch(e){console.log("API results error",e);}
}

async function apiImportElim(showStatus=true){
  try{
    const resp=await fetch(`${FD_BASE}/competitions/${WC2026_ID}/matches?stage=LAST_16,QUARTER_FINALS,SEMI_FINALS,THIRD_PLACE,FINAL`,{headers:{"X-Auth-Token":API_KEY}});
    if(!resp.ok)return;
    const data=await resp.json();
    const phaseMap={"LAST_16":"Oitavas","QUARTER_FINALS":"Quartas","SEMI_FINALS":"Semi","THIRD_PLACE":"Final","FINAL":"Final"};
    const elimUpdates={};
    (data.matches||[]).forEach(match=>{
      if(!match.homeTeam?.name||match.homeTeam.name==="TBD"||match.homeTeam.name==="Yet to be defined")return;
      const phase=phaseMap[match.stage];if(!phase)return;
      const homePT=toPort(match.homeTeam.name),awayPT=toPort(match.awayTeam?.name||"");
      const exists=fbState.elimMatches.find(m=>m.phase===phase&&(m.home===homePT||m.away===awayPT));
      if(exists)return;
      const id=match.id||Date.now();
      const dt=new Date(match.utcDate);
      const brt=new Date(dt.getTime()-3*3600000);
      const dateStr=`${brt.getUTCDate().toString().padStart(2,"0")}/${(brt.getUTCMonth()+1).toString().padStart(2,"0")}`;
      const h=brt.getUTCHours(),mn=brt.getUTCMinutes();
      const timeStr=`${h.toString().padStart(2,"0")}h${mn>0?mn.toString().padStart(2,"0"):""}`;
      elimUpdates[`bolao/elimMatches/${id}`]={id,phase,home:homePT,away:awayPT,date:dateStr,time:timeStr,city:match.venue||""};
    });
    if(Object.keys(elimUpdates).length)await update(ref(db),elimUpdates);
  }catch(e){console.log("API elim error",e);}
}

    const camOk=esp.campeao&&pEsp.campeao&&esp.campeao.toLowerCase()===pEsp.campeao.toLowerCase();
    d.push([i+1,p.n,p.pts,p.st.acertos,p.st.exatos,countPalpites(p.n),pEsp.artilheiro||"—",pEsp.campeao||"—",artOk?"✓":"✗",camOk?"✓":"✗"]);

  XLSX.utils.book_append_sheet(wb,ws,"Ranking");

  const espData=[["Jogador","Artilheiro Palpitado","Campeão Palpitado","Acertou Artilheiro","Acertou Campeão"]];
  players.forEach(n=>{
    const pl=fbState.players[n],pEsp=pl?.especiais||{};
    const artOk=espOficial.artilheiro&&pEsp.artilheiro&&espOficial.artilheiro.toLowerCase()===pEsp.artilheiro.toLowerCase();
    const camOk=espOficial.campeao&&pEsp.campeao&&espOficial.campeao.toLowerCase()===pEsp.campeao.toLowerCase();
    espData.push([n,pEsp.artilheiro||"—",pEsp.campeao||"—",artOk?"✓":"✗",camOk?"✓":"✗"]);
  });
  espData.push(["","","","",""]);
  espData.push(["Resultado oficial","Artilheiro: "+(espOficial.artilheiro||"Não definido"),"Campeão: "+(espOficial.campeao||"Não definido"),"",""]);
  const wsEsp=XLSX.utils.aoa_to_sheet(espData);
  wsEsp['!cols']=[{wch:20},{wch:22},{wch:20},{wch:18},{wch:16}];
  XLSX.utils.book_append_sheet(wb,wsEsp,"Especiais");

  const rd=[["Jogo","Fase","Time Casa","Gols Casa","Gols Fora","Time Fora","Data","Horário","Cidade"]];
  GROUP_MATCHES.forEach(m=>{const res=fbState.results[m.id];rd.push([m.id,"Grupos",m.home,res?.h??"-",res?.a??"-",m.away,m.date,m.time,m.city]);});
  fbState.elimMatches.forEach(m=>{const res=fbState.results['e_'+m.id];rd.push(['e_'+m.id,m.phase,m.home,res?.h??"-",res?.a??"-",m.away,m.date||"-",m.time||"-",m.city||"-"]);});
  const ws2=XLSX.utils.aoa_to_sheet(rd);ws2['!cols']=[{wch:8},{wch:10},{wch:22},{wch:10},{wch:10},{wch:22},{wch:8},{wch:8},{wch:16}];

  XLSX.writeFile(wb,`bolao_ranking_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.xlsx`);

function exportPalpites(){
  const XLSX=window.XLSX,wb=XLSX.utils.book_new();
  const players=Object.keys(fbState.players);
  const header=["Jogo","Times","Data","Resultado Real"];
  players.forEach(n=>header.push(n+" (palpite)","pts"));
  const cons=[header];
  GROUP_MATCHES.forEach(m=>{
    const res=fbState.results[m.id],resStr=res?.h!==undefined?`${res.h}×${res.a}`:"—";
    const row=[m.id,`${m.home} × ${m.away}`,`${m.date} ${m.time}`,resStr];
    players.forEach(n=>{const p=fbState.players[n],pal=p?.palpites?.[m.id];row.push(pal?.h!==undefined?`${pal.h}×${pal.a}`:"—",res?.h!==undefined?calcPts(pal,res,1):"—");});
    cons.push(row);
  });
  fbState.elimMatches.forEach(m=>{
    const eid='e_'+m.id,res=fbState.results[eid],resStr=res?.h!==undefined?`${res.h}×${res.a}`:"—";
    const row=[eid,`${m.home} × ${m.away}`,`${m.date||"?"} ${m.time||"?"}`,resStr];
    players.forEach(n=>{const p=fbState.players[n],pal=p?.elimPalpites?.[eid];row.push(pal?.h!==undefined?`${pal.h}×${pal.a}`:"—",res?.h!==undefined?calcPts(pal,res,2):"—");});
    cons.push(row);
  });
  const totalRow=["","","TOTAL",""];players.forEach(n=>{totalRow.push("",totalPts(n));});cons.push(totalRow);
  const wc=XLSX.utils.aoa_to_sheet(cons);
  const cw=[{wch:8},{wch:28},{wch:14},{wch:12}];players.forEach(()=>cw.push({wch:14},{wch:6}));wc['!cols']=cw;
  XLSX.utils.book_append_sheet(wb,wc,"Consolidado");
  players.forEach(n=>{
    const p=fbState.players[n];
    const d=[["Jogo","Times","Data","Meu Palpite","Resultado","Pontos"]];
    GROUP_MATCHES.forEach(m=>{const pal=p?.palpites?.[m.id],res=fbState.results[m.id];d.push([m.id,`${m.home} × ${m.away}`,`${m.date} ${m.time}`,pal?.h!==undefined?`${pal.h}×${pal.a}`:"—",res?.h!==undefined?`${res.h}×${res.a}`:"—",res?.h!==undefined?calcPts(pal,res,1):"—"]);});
    fbState.elimMatches.forEach(m=>{const eid='e_'+m.id,pal=p?.elimPalpites?.[eid],res=fbState.results[eid];d.push([eid,`${m.home} × ${m.away}`,`${m.date||"?"} ${m.time||"?"}`,pal?.h!==undefined?`${pal.h}×${pal.a}`:"—",res?.h!==undefined?`${res.h}×${res.a}`:"—",res?.h!==undefined?calcPts(pal,res,2):"—"]);});
    d.push(["","","","TOTAL","",totalPts(n)]);
    const ws=XLSX.utils.aoa_to_sheet(d);ws['!cols']=[{wch:8},{wch:28},{wch:14},{wch:12},{wch:12},{wch:8}];
    XLSX.utils.book_append_sheet(wb,ws,n.substring(0,31));
  });
  XLSX.writeFile(wb,`bolao_palpites_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.xlsx`);
}

// ─── ADMIN EVENT DELEGATION ───
async function adminClickHandler(e){
  // Pega o botão clicado (ou o elemento pai se clicou num filho)
  let btn=e.target;
  if(btn.tagName!=="BUTTON")btn=btn.closest("button");
  if(!btn||btn.tagName!=="BUTTON")return;

  const sg=btn.getAttribute("data-save-group");
  const ae=btn.getAttribute("data-add-elim");
  const se=btn.getAttribute("data-save-elim");
  const de=btn.getAttribute("data-del-elim");
  const dp=btn.getAttribute("data-del-player");

  // Salvar grupo
  if(sg){
    e.stopPropagation();
    const updates={};
    // Sempre salva todos os jogos visíveis no grupo — null apaga, valor registra
    GROUPS[sg].matches.forEach(m=>{
      const inp_h=document.querySelector(`input[data-rid="${m.id}"][data-side="h"]`);
      const inp_a=document.querySelector(`input[data-rid="${m.id}"][data-side="a"]`);
      const h=inp_h?inp_h.value.trim():"";
      const a=inp_a?inp_a.value.trim():"";
      if(h===""&&a===""){
        updates[`bolao/results/${m.id}`]=null; // apaga resultado
      } else if(h!==""&&a!==""){
        updates[`bolao/results/${m.id}/h`]=h;
        updates[`bolao/results/${m.id}/a`]=a;
      }
    });
    await update(ref(db),updates);
    localResults={};
    alert(`Grupo ${sg} salvo!`);return;
  }

  // Adicionar jogo eliminatório
  if(ae){
    e.stopPropagation();
    const id=Date.now();
    await set(ref(db,`bolao/elimMatches/${id}`),{id,phase:ae,home:"Time A",away:"Time B",date:"",time:"",city:""});
    return;
  }

  // Salvar jogo eliminatório
  if(se){
    e.stopPropagation();
    const eid=parseInt(se);
    const get=side=>document.querySelector(`input[data-elim-id="${eid}"][data-elim-side="${side}"]`)?.value||"";
    const updates={};
    ["home","away","date","time","city"].forEach(s=>updates[`bolao/elimMatches/${eid}/${s}`]=get(s));
    const rid='e_'+eid;
    if(localResults[rid]){
      if(localResults[rid].h!=="")updates[`bolao/results/${rid}/h`]=localResults[rid].h;
      if(localResults[rid].a!=="")updates[`bolao/results/${rid}/a`]=localResults[rid].a;
    }
    await update(ref(db),updates);alert("Salvo!");return;
  }

  // Deletar jogo eliminatório
  if(de){
    e.stopPropagation();
    if(!confirm("Remover este jogo?"))return;
    const eid=parseInt(de);
    await set(ref(db,`bolao/elimMatches/${eid}`),null);
    await set(ref(db,`bolao/results/e_${eid}`),null);
    return;
  }

  // Deletar jogador
  if(dp){
    e.stopPropagation();
    if(!confirm(`Remover ${dp}?`))return;
    await set(ref(db,`bolao/players/${dp}`),null);
    return;
  }
}

      if(all[idx+1]){peSelectedId=all[idx+1].rid;render();}
    };

    if(nextBtn)nextBtn.onclick=()=>{

      const idx=all.findIndex(m=>m.rid===peSelectedId);
      if(idx>0){peSelectedId=all[idx-1].rid;render();}
    };

  document.querySelectorAll("input[data-mid]").forEach(inp=>{
    inp.oninput=()=>{
      if(isAdmin)return;
      const mid=String(inp.dataset.mid),side=inp.dataset.side;
      if(!inputBuffer[mid]){
        // Inicializa buffer com valores já salvos (usa jogador selecionado se admin)
        const targetPl=isAdmin?detailPlayer:currentUser;
        const pl=targetPl?fbState.players[targetPl]:null;
        const saved=pl?.palpites?.[mid];
        inputBuffer[mid]={h:saved?.h??'',a:saved?.a??''};
      }
      inputBuffer[mid][side]=inp.value;
      const buf=inputBuffer[mid];
      if(buf.h!==undefined&&buf.h!==""&&buf.a!==undefined&&buf.a!==""){
        clearTimeout(autoSaveTimers[mid]);
        const statusEl=document.getElementById(`status_${mid}`);
        if(statusEl){statusEl.textContent="⌛ Aguardando...";statusEl.className="save-status saving";}
        autoSaveTimers[mid]=setTimeout(()=>{
          const m=GROUP_MATCHES.find(x=>String(x.id)===mid);
          if(m&&isLocked(matchTime(m.date,m.time),fbState.results[mid]?.h!==undefined)){
            if(statusEl){statusEl.textContent="🔒 Prazo encerrado";statusEl.className="save-status error";}
            return;
          }
          autoSavePalpite(mid,false);

      }
    };

  const ep=document.getElementById("btn-export-palpites");if(ep)ep.onclick=exportPalpites;

  // admin: especiais
  const bsea=document.getElementById("btn-save-esp-admin");
  if(bsea)bsea.onclick=async()=>{
    const art=document.getElementById("adm-artilheiro").value.trim(),cam=document.getElementById("adm-campeao").value;
    await update(ref(db),{"bolao/especiais/artilheiro":art||null,"bolao/especiais/campeao":cam||null});alert("Especiais salvos!");
  };

  // admin: results manual
  document.querySelectorAll("input[data-rid]").forEach(inp=>{
    inp.oninput=()=>{const rid=inp.dataset.rid,side=inp.dataset.side;if(!localResults[rid])localResults[rid]={h:"",a:""};localResults[rid][side]=inp.value;};
  });
  // Admin buttons via event delegation — registrado uma única vez
  if(!window._adminDelegationActive){
    window._adminDelegationActive=true;
    document.addEventListener("click",adminClickHandler);
  }

  const ap=document.getElementById("btn-add-player");
  if(ap)ap.onclick=async()=>{
    const name=document.getElementById("new-player-name").value.trim();
    const al=document.getElementById("admin-alert");
    if(!name){al.innerHTML='<div class="alert error">Informe o nome</div>';return;}
    if(fbState.players[name]){al.innerHTML='<div class="alert error">Jogador já existe</div>';return;}
    await set(ref(db,`bolao/players/${name}`),{palpites:{},elimPalpites:{},especiais:{}});
    document.getElementById("new-player-name").value="";
  };
}

function showAlert(id,type,msg){
  if(id){const el=document.getElementById(id);if(el){el.innerHTML=`<div class="alert ${type}">${msg}</div>`;setTimeout(()=>{if(el)el.innerHTML=""},2500);}}
  else{const d=document.createElement("div");d.className=`alert ${type}`;d.style.cssText="position:fixed;bottom:20px;right:20px;z-index:999;max-width:300px;border-radius:8px;padding:12px 16px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.15)";d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2500);}
}
</script>
</body>
</html>
